<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Contato</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            padding:40px;
        }

        form{
            background:white;
            padding:30px;
            max-width:600px;
            margin:auto;
            border-radius:8px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        fieldset{
            border:none;
            margin-bottom:20px;
        }

        legend{
            font-size:20px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .campo{
            margin-bottom:15px;
            display:flex;
            flex-direction:column;
        }

        label{
            margin-bottom:5px;
            font-weight:bold;
        }

        input, select, textarea{
            padding:10px;
            border:1px solid #ccc;
            border-radius:4px;
            font-size:14px;
        }

        textarea{
            resize:vertical;
        }

        .opcoes{
            display:flex;
            gap:15px;
        }

        button{
            background:#007BFF;
            color:white;
            border:none;
            padding:12px;
            font-size:16px;
            border-radius:4px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>

<body>

<form>

    <fieldset>
        <legend>Formulário de Contato</legend>

        <div class="campo">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" required>
        </div>

        <div class="campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="campo">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone">
        </div>

        <div class="campo">
            <label for="data">Data</label>
            <input type="date" id="data" name="data">
        </div>

        <div class="campo">
            <label for="assunto">Assunto</label>
            <input type="text" id="assunto" name="assunto">
        </div>

        <div class="campo">
            <label for="categoria">Categoria (Lista Suspensa)</label>
            <select id="categoria" name="categoria">
                <option value="">Selecione</option>
                <option value="duvida">Dúvida</option>
                <option value="suporte">Suporte</option>
                <option value="sugestao">Sugestão</option>
            </select>
        </div>

        <div class="campo">
            <label>Prioridade (Botões de Opção)</label>
            <div class="opcoes">
                <label><input type="radio" name="prioridade" value="baixa"> Baixa</label>
                <label><input type="radio" name="prioridade" value="media"> Média</label>
                <label><input type="radio" name="prioridade" value="alta"> Alta</label>
            </div>
        </div>

        <div class="campo">
            <label>
                <input type="checkbox" name="newsletter">
                Desejo receber novidades por e-mail
            </label>
        </div>

        <div class="campo">
            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" name="mensagem" rows="5"></textarea>
        </div>

        <button type="submit">Enviar Mensagem</button>

    </fieldset>

</form>

</body>
</html>
